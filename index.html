<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>个人阅读与思考助手</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<h1>📚 个人阅读与思考助手</h1>


<section>

<h2>新建阅读记录</h2>


<input id="title" placeholder="文章标题">

<input id="source" placeholder="来源（知乎/书籍/文章）">


<textarea id="quote"
placeholder="摘录内容"></textarea>


<textarea id="thought"
placeholder="我的思考"></textarea>


<input type="file" id="image">


<button onclick="saveReading()">
保存阅读
</button>


</section>



<section>

<h2>阅读统计</h2>

<p>
有效阅读时间：
<span id="time">
0
</span>
分钟
</p>


<button onclick="startTimer()">
开始阅读
</button>


<button onclick="stopTimer()">
结束阅读
</button>


</section>



<section>

<h2>我的阅读档案</h2>

<div id="records"></div>


</section>


<script src="storage.js"></script>

<script src="export.js"></script>

<script src="app.js"></script>

</body>

</html>
