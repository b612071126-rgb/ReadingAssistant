<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
个人阅读与思考助手
</title>


<link rel="stylesheet" href="style.css">


</head>


<body>



<!-- 首页 -->

<section id="readerPanel">


<h1>
📚 个人阅读与思考助手
</h1>



<button
id="startReadingBtn"
onclick="openReader()">

开始阅读

</button>



<div id="stats">

</div>



<button onclick="openArchive()">

我的档案

</button>



</section>





<!-- 阅读页面 -->


<section 
id="readingPage"
style="display:none;">



<div class="top-nav">


<button onclick="goBack()">

←

</button>



<button onclick="openHome()">

🏠

</button>



<button 
class="end-btn"
onclick="stopTimer()">

结束阅读

</button>


</div>





<h2>

正在阅读

</h2>





<div class="time-box">

阅读时间：

<span id="time">

00:00:00

</span>


</div>





<input

id="title"

placeholder="文章标题"

>




<input

id="source"

placeholder="来源"

>





<h3>

摘录

</h3>



<textarea

id="quote"

placeholder="记录重要内容">

</textarea>





<h3>

思考

</h3>



<textarea

id="thought"

placeholder="记录你的想法">

</textarea>







<h3>

标签

</h3>



<div id="tagBox">


<button onclick="selectTag('AI')">

AI

</button>



<button onclick="selectTag('心理学')">

心理学

</button>



<button onclick="selectTag('计算机')">

计算机

</button>



<button onclick="selectTag('哲学')">

哲学

</button>



<button onclick="selectTag('学习方法')">

学习方法

</button>



</div>




<p>

已选择标签：

<span id="selectedTags">

无

</span>


</p>







<button onclick="saveCurrentReading()">

保存并开始下一篇

</button>





</section>









<!-- 档案页面 -->


<section

id="archivePage"

style="display:none;">





<div class="top-nav">


<button onclick="goBack()">

←

</button>



<button onclick="openHome()">

🏠

</button>


</div>






<h2>

我的阅读档案

</h2>





<div id="records">

</div>





</section>








<script src="storage.js"></script>

<script src="reader.js"></script>

<script src="export.js"></script>

<script src="app.js"></script>



</body>


</html>
