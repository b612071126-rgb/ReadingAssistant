<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
个人阅读与思考助手
</title>

<link rel="stylesheet" href="style.css">

</head>



<body>



<!-- 首页 -->

<section id="readerPanel">


<h1>
📚 个人阅读与思考助手
</h1>



<button onclick="openReader()">

开始阅读

</button>



<button onclick="openQuickNote()">

✏️ 速记模式

</button>




<div id="stats">

</div>



<button onclick="openArchive()">

我的档案

</button>




<button onclick="openHelp()">

说明与反馈

</button>




<div id="todayQuote">


<h3>
今日思考
</h3>


<p>

阅读不是为了知道更多，而是为了看见更大的世界。

</p>


</div>




</section>








<!-- 阅读页面 -->


<section 
id="readingPage"
style="display:none;">



<div class="top-nav">


<button onclick="goBack()">

←

</button>


<button onclick="openHome()">

🏠

</button>



</div>





<div class="reading-header">


<h2>

正在阅读

</h2>



<button 
class="end-btn"
onclick="stopTimer()">

结束阅读

</button>


</div>







<p>

阅读时间：

<span id="time">

00:00:00

</span>


</p>





<input 
id="title"
placeholder="文章标题">





<input
id="source"
placeholder="来源">







<h3>

标签

</h3>




<div id="tags">


<button onclick="selectTag('AI')">

AI

</button>


<button onclick="selectTag('计算机')">

计算机

</button>


<button onclick="selectTag('心理学')">

心理学

</button>


<button onclick="selectTag('哲学')">

哲学

</button>


<button onclick="selectTag('科学')">

科学

</button>


<button onclick="selectTag('历史')">

历史

</button>


<button onclick="selectTag('商业')">

商业

</button>


<button onclick="selectTag('其他')">

其他

</button>


</div>







<h3>

摘录

</h3>


<textarea

id="quote"

placeholder="记录重要内容">

</textarea>







<h3>

思考

</h3>



<textarea

id="thought"

placeholder="记录你的想法">

</textarea>







<h3>

图片

</h3>



<input

type="file"

id="imageInput"

accept="image/*"

>




<button onclick="saveImage()">

📷 保存图片

</button>







<br>



<button onclick="saveCurrentReading()">

保存当前记录

</button>




</section>









<!-- 档案页面 -->


<section

id="archivePage"

style="display:none;">



<div class="top-nav">


<button onclick="goBack()">

←

</button>



<button onclick="openHome()">

🏠

</button>



</div>





<h2>

我的阅读档案

</h2>





<div>


<input

id="searchInput"

placeholder="🔍 搜索阅读内容"

oninput="searchArchives()"

>


</div>






<div id="records">

</div>



</section>









<!-- 详情页面 -->


<section

id="detailPage"

style="display:none;">



<div class="top-nav">


<button onclick="goBack()">

←

</button>


</div>



<h2>

阅读详情

</h2>



<div id="detailContent">

</div>



</section>









<!-- 速记页面 -->


<section

id="quickPage"

style="display:none;">



<div class="top-nav">


<button onclick="goBack()">

←

</button>



<button onclick="openHome()">

🏠

</button>



</div>




<h2>

速记模式

</h2>



<p>

记录时间：

<span id="quickTime">

00:00:00

</span>


</p>





<textarea

id="quickContent"

placeholder="快速记录你的想法">

</textarea>



<button onclick="saveQuickNote()">

保存速记

</button>



</section>









<!-- 说明反馈 -->


<section

id="helpPage"

style="display:none;">



<div class="top-nav">


<button onclick="goBack()">

←

</button>



</div>





<h2>

说明与反馈

</h2>



<p>

这是一个帮助自己阅读、记录和思考的工具。

</p>



<p>

反馈邮箱：

后续填写

</p>



</section>









<script src="storage.js"></script>

<script src="reader.js"></script>

<script src="export.js"></script>

<script src="app.js"></script>



</body>


</html>
