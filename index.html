<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>个人阅读与思考助手</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- 首页 -->

<section id="homePage">


<h1>
📚 个人阅读与思考助手
</h1>


<button 
id="startReadingBtn"
onclick="startTimer()">

开始阅读

</button>


</section>





<!-- 阅读页面 -->


<section 
id="readingPage"
style="display:none;">



<h2>
正在阅读
</h2>



<input 
id="title"
placeholder="文章标题">



<input 
id="source"
placeholder="来源">


<h3>
摘录
</h3>


<textarea 
id="quote"
placeholder="记录重要内容">
</textarea>



<h3>
思考
</h3>


<textarea 
id="thought"
placeholder="记录你的想法">
</textarea>



<h3>
标签
</h3>


<button>
AI
</button>

<button>
心理学
</button>

<button>
计算机
</button>


<br><br>



<button onclick="saveReading()">

保存当前记录

</button>



<button onclick="stopTimer()">

结束阅读

</button>


<p>

阅读时间：

<span id="time">

0

</span>

分钟

</p>



</section>







<!-- 档案页面 -->


<section 
id="archivePage">


<h2>
我的阅读档案
</h2>


<div id="records">

</div>


</section>





<script src="storage.js"></script>

<script src="reader.js"></script>

<script src="export.js"></script>

<script src="app.js"></script>


</body>

</html>
