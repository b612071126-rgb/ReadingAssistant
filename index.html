<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
个人阅读与思考助手
</title>


<link rel="stylesheet" href="style.css">


</head>


<body>



<!-- 首页 -->

<section id="readerPanel">


<h1>
📚 个人阅读与思考助手
</h1>


<p id="todayQuote">

阅读，让生活拥有更多可能。

</p>




<button onclick="openReader()">

开始阅读

</button>



<button onclick="openQuickNote()">

✏️ 速记模式

</button>




<div id="stats">

</div>




<button onclick="openArchive()">

📚 我的档案

</button>




<button onclick="openHelp()">

⚙️ 说明与反馈

</button>




</section>







<!-- 阅读页面 -->

<section 
id="readingPage"
style="display:none;">



<div class="top-nav">


<button onclick="goBack()">

←

</button>



<button onclick="openHome()">

🏠

</button>



</div>





<div class="reading-header">


<h2>

正在阅读

</h2>



<button 
class="end-btn"
onclick="stopTimer()">

结束阅读

</button>


</div>





<div class="time-box">


阅读时间：

<span id="time">

00:00:00

</span>


</div>





<input 
id="title"
placeholder="文章标题">





<input 
id="source"
placeholder="来源">





<h3>
标签
</h3>


<div id="tagBox">


<button onclick="selectTag(this,'🤖 AI')">
🤖 AI
</button>


<button onclick="selectTag(this,'💻 计算机')">
💻 计算机
</button>


<button onclick="selectTag(this,'🧠 心理学')">
🧠 心理学
</button>


<button onclick="selectTag(this,'🏛️ 哲学')">
🏛️ 哲学
</button>


<button onclick="selectTag(this,'📚 文学')">
📚 文学
</button>


<button onclick="selectTag(this,'🔬 科学')">
🔬 科学
</button>


<button onclick="selectTag(this,'🌍 社会')">
🌍 社会
</button>


<button onclick="selectTag(this,'💼 商业')">
💼 商业
</button>


<button onclick="selectTag(this,'🎨 创意')">
🎨 创意
</button>


<button onclick="selectTag(this,'📌 其他')">
📌 其他
</button>


</div>






<h3>

摘录

</h3>


<textarea

id="quote"

placeholder="记录重要内容">

</textarea>








<h3>

思考

</h3>


<textarea

id="thought"

placeholder="记录你的想法">

</textarea>







<h3>
图片资料
</h3>


<input 
type="file"
id="imageInput"
accept="image/*"
multiple
onchange="selectImages(event)">



<button onclick="saveCurrentReading()">

保存当前阅读

</button>



</section>










<!-- 档案页面 -->

<section

id="archivePage"

style="display:none;">



<div class="top-nav">


<button onclick="goBack()">

←

</button>



<button onclick="openHome()">

🏠

</button>


</div>





<h2>

我的阅读档案

</h2>



<div class="search-box">


<input

id="searchInput"

placeholder="🔍 搜索标题、内容、标签"

oninput="searchArchives()"


>


</div>





<div id="records">

</div>



</section>









<!-- 阅读详情 -->

<section

id="detailPage"

style="display:none;">



<div class="top-nav">


<button onclick="goBack()">

←

</button>


</div>




<h2>

阅读详情

</h2>


<div id="detailContent">

</div>



</section>









<!-- 速记 -->

<section

id="quickPage"

style="display:none;">



<div class="top-nav">


<button onclick="goBack()">

←

</button>



<button onclick="openHome()">

🏠

</button>



</div>





<h2>

速记模式

</h2>




<p>

记录时间：

<span id="quickTime">

00:00:00

</span>


</p>




<textarea

id="quickContent"

placeholder="快速记录">

</textarea>




<button onclick="saveQuickNote()">

保存速记

</button>



</section>









<!-- 说明反馈 -->


<section

id="helpPage"

style="display:none;">



<div class="top-nav">


<button onclick="goBack()">

←

</button>


</div>




<h2>

说明与反馈

</h2>




<p>

个人阅读与思考助手

</p>



<p>

帮助用户完成：

阅读 → 摘录 → 思考 → 沉淀

</p>



<p>

反馈方式：

后续填写

</p>




</section>








<script src="storage.js"></script>

<script src="reader.js"></script>

<script src="export.js"></script>

<script src="app.js"></script>


</body>


</html>
